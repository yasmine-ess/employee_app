<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>{{ isEditMode ? 'Modifier un employé' : 'Ajouter un employé' }}</h2>
      <p>{{ isEditMode ? 'Modifiez les informations ci-dessous' : 'Remplissez les informations ci-dessous' }}</p>
    </div>

    <div class="card-body">
      <div class="form-group">
        <label>Nom complet</label>
        <input 
          type="text" 
          [(ngModel)]="employee.name" 
          placeholder="Ex: Alice Martin"
        />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input 
          type="email" 
          [(ngModel)]="employee.email" 
          placeholder="Ex: alice@example.com"
        />
      </div>

      <div class="form-group">
        <label>Département</label>
        <select [(ngModel)]="employee.department">
          <option value="">-- Choisir --</option>
          <option value="Informatique">Informatique</option>
          <option value="RH">RH</option>
          <option value="Finance">Finance</option>
          <option value="Marketing">Marketing</option>
        </select>
      </div>

      <div class="form-group">
        <label>Salaire (€)</label>
        <input 
          type="number" 
          [(ngModel)]="employee.salary" 
          placeholder="Ex: 3000"
        />
      </div>

      <div class="actions">
        <button class="btn-cancel" (click)="cancel()">Annuler</button>
        <button class="btn-save" (click)="save()">
          {{ isEditMode ? 'Enregistrer' : 'Ajouter' }}
        </button>
      </div>
    </div>
  </div>
</div>
